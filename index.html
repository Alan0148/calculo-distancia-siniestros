<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Calcular KM Siniestros</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

</head>

<body>

<h2>Calcular KM Siniestros</h2>

<input type="file" id="fileInput">

<br><br>

<button onclick="procesar()">Calcular</button>
<button onclick="generarExcel()">Generar Excel</button>

<p id="estado"></p>

<pre id="resultado"></pre>

<script>

let datosExcel = [];

async function calcularRuta(lat1, lon1, lat2, lon2){

try{

let url =
"https://router.project-osrm.org/route/v1/driving/" +
lon1 + "," + lat1 + ";" +
lon2 + "," + lat2 +
"?overview=false";

let response = await fetch(url);
let data = await response.json();

if(!data.routes || data.routes.length === 0){
return null;
}

return (data.routes[0].distance / 1000).toFixed(2);

}catch(error){
console.log("Error OSRM:", error);
return null;
}

}

function procesar(){

let file = document.getElementById("fileInput").files[0];

if(!file){
alert("Selecciona un archivo Excel (.xlsx)");
return;
}

document.getElementById("estado").textContent =
"Leyendo archivo...";

let reader = new FileReader();

reader.onload = function(e){

let data = new Uint8Array(e.target.result);

let workbook = XLSX.read(data, {type: 'array'});

let sheetName = workbook.SheetNames[0];

let sheet = workbook.Sheets[sheetName];

let filas = XLSX.utils.sheet_to_json(sheet, {header: 1});

procesarFilas(filas);

};

reader.readAsArrayBuffer(file);

}

async function procesarFilas(filas){

datosExcel = [];

datosExcel.push([
"RECLAMO",
"LATITUD_ORIGEN",
"LONGITUD_ORIGEN",
"LATITUD_DESTINO",
"LONGITUD_DESTINO",
"DISTANCIA_KM"
]);

let salida = "";
let contadorValidos = 0;

for(let i = 0; i < filas.length; i++){

let row = filas[i];

if(!row){
continue;
}

// Limpieza segura
let reclamo = (row[0] || "").toString().trim();
let lat1 = Number(row[1]);
let lon1 = Number(row[2]);
let lat2 = Number(row[3]);
let lon2 = Number(row[4]);

console.log("Fila:", reclamo, lat1, lon1, lat2, lon2);

if(
!reclamo ||
!isFinite(lat1) ||
!isFinite(lon1) ||
!isFinite(lat2) ||
!isFinite(lon2)
){
continue;
}

contadorValidos++;

document.getElementById("estado").textContent =
"Procesando " + reclamo;

let dist = await calcularRuta(lat1, lon1, lat2, lon2);

if(!dist) dist = "No disponible";

datosExcel.push([
reclamo,
lat1,
lon1,
lat2,
lon2,
dist
]);

salida += reclamo + " → " + dist + " km\n";

}

document.getElementById("resultado").textContent = salida;

document.getElementById("estado").textContent =
"Listo. Registros válidos: " + contadorValidos;

console.log("DATOS EXCEL FINAL:", datosExcel);

}

function generarExcel(){

if(datosExcel.length <= 1){
alert("No hay datos para exportar");
return;
}

let wb = XLSX.utils.book_new();

let ws = XLSX.utils.aoa_to_sheet(datosExcel);

XLSX.utils.book_append_sheet(wb, ws, "KM_Siniestros");

XLSX.writeFile(wb, "Reporte_KM_Siniestros.xlsx");

}

</script>

</body>
</html>
