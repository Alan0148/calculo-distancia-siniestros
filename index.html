<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Calcular KM Siniestros</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

</head>

<body>

<h2>Calcular KM Siniestros</h2>

<input type="file" id="fileInput">
<br><br>

<button onclick="procesar()">Calcular</button>
<button onclick="generarExcel()">Generar Excel</button>

<p id="estado"></p>

<pre id="resultado"></pre>

<script>

let datosExcel = [];

async function calcularRuta(lat1, lon1, lat2, lon2){

try{

let url =
"https://router.project-osrm.org/route/v1/driving/" +
lon1 + "," + lat1 + ";" +
lon2 + "," + lat2 +
"?overview=false";

let response = await fetch(url);
let data = await response.json();

if(!data.routes || data.routes.length === 0){
return null;
}

return (data.routes[0].distance / 1000).toFixed(2);

}catch(e){
console.log(e);
return null;
}

}

function procesar(){

let file = document.getElementById("fileInput").files[0];

if(!file){
alert("Selecciona un archivo CSV");
return;
}

document.getElementById("estado").textContent = "Leyendo archivo...";

Papa.parse(file, {

skipEmptyLines: true,

complete: async function(results){

let filas = results.data;

console.log("FILAS:", filas);

datosExcel = [];

datosExcel.push([
"RECLAMO",
"LATITUD_ORIGEN",
"LONGITUD_ORIGEN",
"LATITUD_DESTINO",
"LONGITUD_DESTINO",
"DISTANCIA_KM"
]);

let salida = "";

for(let i = 0; i < filas.length; i++){

let row = filas[i];

if(!row || row.length < 5){
continue;
}

let reclamo = row[0];
let lat1 = Number(row[1]);
let lon1 = Number(row[2]);
let lat2 = Number(row[3]);
let lon2 = Number(row[4]);

if(
isNaN(lat1) || isNaN(lon1) ||
isNaN(lat2) || isNaN(lon2)
){
continue;
}

document.getElementById("estado").textContent =
"Procesando " + reclamo;

let dist = await calcularRuta(lat1, lon1, lat2, lon2);

if(!dist) dist = "No disponible";

datosExcel.push([
reclamo,
lat1,
lon1,
lat2,
lon2,
dist
]);

salida += reclamo + " → " + dist + " km\n";

}

document.getElementById("resultado").textContent = salida;

document.getElementById("estado").textContent =
"Listo. Genera el Excel.";

}

});

}

function generarExcel(){

if(datosExcel.length <= 1){
alert("No hay datos para exportar");
return;
}

let wb = XLSX.utils.book_new();
let ws = XLSX.utils.aoa_to_sheet(datosExcel);

XLSX.utils.book_append_sheet(wb, ws, "KM_Siniestros");

XLSX.writeFile(wb, "Reporte_KM_Siniestros.xlsx");

}

</script>

</body>
</html>
